<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saiba's Birthday Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 1;
            max-width: 90%;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #d81b60;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            color: #7b1fa2;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .timer-wrapper {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Custom Countdown Styles */
        #custom-countdown {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .time-box {
            background: linear-gradient(135deg, #f8bbd0, #e1bee7);
            color: #4a148c;
            padding: 15px;
            border-radius: 10px;
            min-width: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .time-box span {
            display: block;
            font-size: 2.2rem;
            font-weight: 600;
        }

        .time-box .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            color: #6a1b9a;
            font-weight: bold;
        }

        .finished-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #d81b60;
            margin: 0;
        }

        /* Floating Decoration */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f48fb1;
            top: -10%;
            border-radius: 2px;
            animation: fall 4s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <script>
        // Generate Confetti
        for (let i = 0; i < 20; i++) {
            let confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.backgroundColor = ['#f48fb1', '#ce93d8', '#81d4fa', '#ffcc80'][Math.floor(Math.random() * 4)];
            document.body.appendChild(confetti);
        }
    </script>

    <div class="container">
        <h1>For Saiba</h1>
        <p>The Big Day is Approaching...</p>
        
        <div class="timer-wrapper">
            <div id="custom-countdown">
                <div class="time-box">
                    <span id="days">00</span>
                    <div class="label">Days</div>
                </div>
                <div class="time-box">
                    <span id="hours">00</span>
                    <div class="label">Hours</div>
                </div>
                <div class="time-box">
                    <span id="minutes">00</span>
                    <div class="label">Minutes</div>
                </div>
                <div class="time-box">
                    <span id="seconds">00</span>
                    <div class="label">Seconds</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set the target date: April 11, 2026 at 00:00:00 GMT+6
        const targetDate = new Date("2026-04-11T00:00:00+06:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // When the countdown is over
            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("custom-countdown").innerHTML = "<h2 class='finished-text'>Happy Birthday Saiba!</h2>";
                return;
            }

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display updates
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>

</body>
</html>
